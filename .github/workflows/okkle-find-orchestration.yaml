name: "Deploy Now: Orchestration"
run-name: "Deploy Now: Build okkle-find · ${{ github.event.head_commit.message || format('Triggered by {0}', github.triggering_actor) }}"

on:
  - push
  - workflow_dispatch

jobs:
  retrieve-project:
    name: check readiness
    runs-on: ubuntu-latest
    outputs:
      deployment-enabled: ${{ steps.project-info.outputs.deployment-enabled }}
      branch-id: ${{ steps.project-info.outputs.branch-id }}
    steps:
      - name: Fetch project data
        uses: ionos-deploy-now/project-action@v1
        id: project
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: d8e9d413-4a70-49f0-b375-e4a0a4aed76f
          action: retrieve-info

      - name: Normalize project data
        id: project-info
        if: ${{ always() }}
        shell: bash
        env:
          PROJECT_INFO: ${{ steps.project.outputs.info }}
        run: |
          if [[ -z "$PROJECT_INFO" ]] || ! jq -e . >/dev/null 2>&1 <<< "$PROJECT_INFO"; then
            echo "deployment-enabled=false" >> "$GITHUB_OUTPUT"
            echo "branch-id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deployment-enabled=$(jq -r '."deployment-enabled" // false' <<< "$PROJECT_INFO")" >> "$GITHUB_OUTPUT"
          echo "branch-id=$(jq -r '."branch-id" // ""' <<< "$PROJECT_INFO")" >> "$GITHUB_OUTPUT"


  build:
    name: build
    needs: retrieve-project
    if: ${{ needs.retrieve-project.outputs.deployment-enabled == 'true' }}
    uses: ./.github/workflows/okkle-find-build.yaml
    with:
      site-url: https://IONOS_DEPLOY_NOW_SITE_URL
      branch-id: ${{ needs.retrieve-project.outputs.branch-id }}
    secrets: inherit

  deploy:
    name: trigger deployment
    needs:
      - retrieve-project
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deployment(s)
        uses: ionos-deploy-now/project-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: d8e9d413-4a70-49f0-b375-e4a0a4aed76f
          branch-id: ${{ needs.retrieve-project.outputs.branch-id }}
          action: dispatch-deployments
